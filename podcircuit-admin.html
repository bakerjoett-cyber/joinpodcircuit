<script>
let currentStatus = 'pending';

if (sessionStorage.getItem('admin_logged') === 'true') {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').classList.add('show');
  loadProfiles('pending');
}

async function login() {
  let user = document.getElementById('username').value.trim();
  let pass = document.getElementById('password').value;

  if (user === 'admin' && pass === 'podcircuit2026') {
    sessionStorage.setItem('admin_logged', 'true');
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').classList.add('show');
    loadProfiles('pending');
  } else {
    alert('Wrong credentials');
  }
}

function logout() {
  sessionStorage.removeItem('admin_logged');
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('dashboard').classList.remove('show');
}

async function loadProfiles(status, btn = null) {
  currentStatus = status;

  document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
  if (btn) {
    btn.classList.add('active');
  } else {
    const activeBtn = Array.from(document.querySelectorAll('.tab')).find(
      tab => tab.textContent.toLowerCase().includes(status)
    );
    if (activeBtn) activeBtn.classList.add('active');
  }

  let container = document.getElementById('profilesContainer');
  container.innerHTML = 'Loading...';

  try {
    let profiles = [];

    if (status === 'pending') {
      let res = await dbGetPendingProfiles();
      if (res.error) throw res.error;
      profiles = res.data || [];
    } else {
      let res = await dbGetProfilesByStatus(status);
      if (res.error) throw res.error;
      profiles = res.data || [];
    }

    let pendingRes = await dbGetProfilesByStatus('pending');
    let approvedRes = await dbGetProfilesByStatus('approved');

    if (pendingRes.error) throw pendingRes.error;
    if (approvedRes.error) throw approvedRes.error;

    let pendingCount = (pendingRes.data || []).length;
    let approvedCount = (approvedRes.data || []).length;

    document.getElementById('pendingCount').innerText = pendingCount;
    document.getElementById('approvedCount').innerText = approvedCount;

    if (!profiles.length) {
      container.innerHTML = `<div class="card"><div class="card-body">No applications found.</div></div>`;
      return;
    }

    container.innerHTML = profiles.map(p => `
      <div class="card">
        <div class="card-header">
          <strong>${escapeHtml((p.first_name || '') + ' ' + (p.last_name || ''))}</strong>
          <span class="pending-badge">${escapeHtml(p.status || '')}</span>
        </div>
        <div class="card-body">
          <div><strong>Title:</strong> ${escapeHtml(p.title || '')}</div>
          <div><strong>Email:</strong> ${escapeHtml(p.email || '')}</div>
          <div><strong>City:</strong> ${escapeHtml(p.city || '')}</div>
          <div><strong>Story:</strong> ${escapeHtml(p.story || '')}</div>
          <div><strong>Turning Point:</strong> ${escapeHtml(p.turning_pt || '')}</div>
          <div><strong>Categories:</strong> ${Array.isArray(p.categories) ? p.categories.map(escapeHtml).join(', ') : ''}</div>
          <div><strong>Talking Points:</strong> ${Array.isArray(p.points) ? p.points.map(escapeHtml).join(', ') : ''}</div>
          <div><strong>Instagram:</strong> ${escapeHtml(p.ig_handle || '')} ${p.ig_followers ? '(' + escapeHtml(String(p.ig_followers)) + ')' : ''}</div>
          <div><strong>TikTok:</strong> ${escapeHtml(p.tt_handle || '')} ${p.tt_followers ? '(' + escapeHtml(String(p.tt_followers)) + ')' : ''}</div>
          <div><strong>YouTube:</strong> ${escapeHtml(p.yt_url || '')} ${p.yt_subs ? '(' + escapeHtml(String(p.yt_subs)) + ')' : ''}</div>
          <div><strong>LinkedIn:</strong> ${escapeHtml(p.li_url || '')} ${p.li_followers ? '(' + escapeHtml(String(p.li_followers)) + ')' : ''}</div>
          <div><strong>Availability:</strong> ${escapeHtml(p.availability || '')}</div>
          <div><strong>Format:</strong> ${escapeHtml(p.format || '')}</div>
          <div><strong>Podcast Experience:</strong> ${escapeHtml(p.pod_exp || '')}</div>
          <div><strong>Clip:</strong> ${escapeHtml(p.clip || '')}</div>
        </div>
        <div class="card-actions">
          ${status === 'pending' ? `
            <button class="approve" onclick="updateStatus('${escapeJs(p.user_id)}', 'approved')">Approve</button>
            <button class="reject" onclick="updateStatus('${escapeJs(p.user_id)}', 'rejected')">Reject</button>
          ` : ''}
        </div>
      </div>
    `).join('');
  } catch (e) {
    console.error(e);
    container.innerHTML = 'Error loading profiles';
  }
}

async function updateStatus(userId, newStatus) {
  if (!confirm(`Are you sure you want to mark this profile as ${newStatus}?`)) return;

  try {
    let res = await dbUpdateStatus(userId, newStatus);
    if (res.error) throw res.error;
    loadProfiles(currentStatus);
  } catch (e) {
    console.error(e);
    alert('Error updating profile status');
  }
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function escapeJs(str) {
  if (!str) return '';
  return String(str).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}
</script>
