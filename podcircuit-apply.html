<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apply as a Guest — PodCircuit</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase-config.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:system-ui;background:#f5f0e8;}
  header{background:#0e0c0a;color:white;padding:0 40px;display:flex;justify-content:space-between;align-items:center;height:68px;border-bottom:2px solid #c9a84c;}
  .logo{font-weight:800;font-size:1.4rem;display:flex;align-items:center;gap:8px;text-decoration:none;color:white;}
  .logo-dot{width:10px;height:10px;background:#c9a84c;border-radius:50%;}
  .back-link{color:#aaa;text-decoration:none;}
  .form-wrap{max-width:600px;margin:0 auto;padding:48px 40px;}
  .step-panel{display:none;}
  .step-panel.active{display:block;}
  .step-tag{background:#e8f4f4;color:#1a6b6b;font-size:0.7rem;padding:4px 12px;border-radius:20px;display:inline-block;margin-bottom:12px;}
  .step-heading h2{font-size:1.8rem;margin-bottom:8px;}
  .field-row{margin-bottom:20px;}
  .field{display:flex;flex-direction:column;gap:6px;}
  input,textarea,select{padding:12px;border:1px solid #ddd;border-radius:8px;width:100%;}
  button{background:#c9a84c;padding:12px 24px;border:none;border-radius:8px;cursor:pointer;font-weight:bold;}
  .form-nav{display:flex;justify-content:space-between;margin-top:30px;}
  .btn-back{background:#eee;}
  .success-screen{display:none;text-align:center;padding:60px;background:white;border-radius:12px;margin-top:20px;}
  .success-screen.show{display:block;}
  .error{color:#c0392b;font-size:0.75rem;display:none;}
  .error.show{display:block;}
</style>
</head>
<body>
<header>
  <a class="logo" href="podcast-circuit.html"><div class="logo-dot"></div>PodCircuit</a>
  <a href="podcast-circuit.html" class="back-link">← Back</a>
</header>

<div class="form-wrap">
  <div class="step-panel active" id="step1">
    <div class="step-heading"><div class="step-tag">Step 1 of 3</div><h2>Tell us about yourself</h2></div>
    <div class="field-row"><div class="field"><label>First Name *</label><input type="text" id="firstName"></div><div class="field"><label>Last Name *</label><input type="text" id="lastName"></div></div>
    <div class="field-row"><div class="field"><label>Email *</label><input type="email" id="email"></div></div>
    <div class="field-row"><div class="field"><label>Title *</label><input type="text" id="title"></div></div>
    <div class="field-row"><div class="field"><label>City *</label><input type="text" id="city"></div></div>
    <div class="form-nav"><div></div><button class="btn-next" onclick="goToStep(2)">Next →</button></div>
  </div>

  <div class="step-panel" id="step2">
    <div class="step-heading"><div class="step-tag">Step 2 of 3</div><h2>Your story</h2></div>
    <div class="field-row"><div class="field"><label>Your Story *</label><textarea id="story" rows="5"></textarea><span class="error" id="err-story">Please write at least 50 characters</span></div></div>
    <div class="field-row"><div class="field"><label>Instagram Followers</label><input type="number" id="igFollowers"></div><div class="field"><label>TikTok Followers</label><input type="number" id="ttFollowers"></div></div>
    <div class="form-nav"><button class="btn-back" onclick="goToStep(1)">← Back</button><button class="btn-next" onclick="goToStep(3)">Next →</button></div>
  </div>

  <div class="step-panel" id="step3">
    <div class="step-heading"><div class="step-tag">Step 3 of 3</div><h2>Topics & submit</h2></div>
    <div class="field-row"><div class="field"><label>Category *</label><select id="category"><option>Business</option><option>Health</option><option>Tech</option><option>Sports</option></select></div></div>
    <div class="field-row"><div class="field"><label>Talking Point *</label><input type="text" id="point1"><span class="error" id="err-points">Required</span></div></div>
    <div class="form-nav"><button class="btn-back" onclick="goToStep(2)">← Back</button><button class="btn-submit" onclick="submitForm()">Submit →</button></div>
  </div>

  <div class="success-screen" id="successScreen"><div class="success-icon">🎙</div><h2>Submitted!</h2><p>Your profile is under review.</p></div>
</div>

<script>
let step = 1;
function goToStep(n) {
  if (n > step && !validateStep(step)) return;
  document.getElementById('step'+step).classList.remove('active');
  document.getElementById('step'+n).classList.add('active');
  step = n;
}
function validateStep(s) {
  let ok=true;
  if(s==1){
    if(!document.getElementById('firstName').value.trim()) ok=false;
    if(!document.getElementById('lastName').value.trim()) ok=false;
    if(!document.getElementById('email').value.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) ok=false;
    if(!document.getElementById('title').value.trim()) ok=false;
    if(!document.getElementById('city').value.trim()) ok=false;
    if(!ok) alert('Please fill all required fields');
  }
  if(s==2){
    if(document.getElementById('story').value.trim().length<50){
      document.getElementById('err-story').classList.add('show');
      ok=false;
    } else document.getElementById('err-story').classList.remove('show');
  }
  if(s==3){
    if(!document.getElementById('point1').value.trim()){
      document.getElementById('err-points').classList.add('show');
      ok=false;
    } else document.getElementById('err-points').classList.remove('show');
  }
  return ok;
}
async function submitForm(){
  if(!validateStep(3)) return;
  const data={
    user_id:'user_'+Date.now(),
    first_name:document.getElementById('firstName').value,
    last_name:document.getElementById('lastName').value,
    email:document.getElementById('email').value,
    title:document.getElementById('title').value,
    city:document.getElementById('city').value,
    story:document.getElementById('story').value,
    ig_followers:parseInt(document.getElementById('igFollowers').value)||0,
    tt_followers:parseInt(document.getElementById('ttFollowers').value)||0,
    categories:[document.getElementById('category').value],
    points:[document.getElementById('point1').value],
    status:'pending',
    submitted_at:new Date().toISOString()
  };
  try{
    if(typeof dbSaveProfile!=='undefined'){
      await dbSaveProfile(data);
      document.getElementById('step3').classList.remove('active');
      document.getElementById('successScreen').classList.add('show');
    } else alert('Supabase not loaded');
  }catch(e){alert('Error: '+e.message);}
}
</script>
</body>
</html>
