<script>
let step = 1;

function goToStep(n) {
  if (n > step && !validateStep(step)) return;
  document.querySelectorAll('.step-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('step' + n).classList.add('active');
  step = n;
}

function validateStep(s) {
  let ok = true;

  const showError = (id, show) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.toggle('show', !!show);
  };

  if (s === 1) {
    const firstName = document.getElementById('firstName')?.value.trim() || '';
    const lastName  = document.getElementById('lastName')?.value.trim() || '';
    const email     = document.getElementById('email')?.value.trim() || '';
    const title     = document.getElementById('title')?.value.trim() || '';
    const city      = document.getElementById('city')?.value.trim() || '';

    if (!firstName || !lastName || !title || !city) ok = false;
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) ok = false;

    if (!ok) alert('Please fill all required fields correctly.');
  }

  if (s === 2) {
    const story = document.getElementById('story')?.value.trim() || '';
    const bad = story.length < 50;
    showError('err-story', bad);
    if (bad) ok = false;
  }

  if (s === 3) {
    const point = document.getElementById('point')?.value.trim() || '';
    const bad = !point;
    showError('err-points', bad);
    if (bad) ok = false;
  }

  return ok;
}

async function submitForm() {
  if (!validateStep(3)) return;

  const email = document.getElementById('email')?.value.trim() || '';
  const userId = 'u_' + email.replace(/[^a-z0-9]/gi, '_').toLowerCase();

  const profileData = {
    userId,
    email,
    firstName: document.getElementById('firstName')?.value.trim() || '',
    lastName: document.getElementById('lastName')?.value.trim() || '',
    title: document.getElementById('title')?.value.trim() || '',
    city: document.getElementById('city')?.value.trim() || '',
    website: '',
    story: document.getElementById('story')?.value.trim() || '',
    turningPt: '',
    achieve: '',
    igH: '',
    igF: parseInt(document.getElementById('igFollowers')?.value || '0', 10) || 0,
    ttH: '',
    ttF: parseInt(document.getElementById('ttFollowers')?.value || '0', 10) || 0,
    ytU: '',
    ytS: 0,
    twH: '',
    twF: 0,
    liU: '',
    liF: 0,
    categories: [document.getElementById('category')?.value || ''],
    points: [document.getElementById('point')?.value.trim() || ''],
    availability: '',
    format: '',
    podExp: '',
    clip: '',
    photo: '',
    status: 'pending'
  };

  try {
    if (typeof dbSaveProfile !== 'function') {
      alert('Supabase is not loaded. Check supabase-config.js');
      return;
    }

    const saveRes = await dbSaveProfile(profileData);
    if (saveRes?.error) throw saveRes.error;

    const reviewRes = await dbSubmitForReview(userId);
    if (reviewRes?.error) throw reviewRes.error;

    if (typeof sendEmailNotification === 'function') {
      await sendEmailNotification(profileData);
    }

    document.getElementById('step3')?.classList.remove('active');
    document.getElementById('successScreen')?.classList.add('show');
  } catch (e) {
    console.error('Submit failed:', e);
    alert('Error submitting profile: ' + (e.message || 'Unknown error'));
  }
}
</script>
